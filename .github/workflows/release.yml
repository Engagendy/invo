name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    env:
      RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
      TROCR_MODEL_NAME: microsoft/trocr-base-handwritten
      MAC_BUILD_ARCH: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build macOS Release
        env:
          PYTHON_BIN: python
        run: bash build_release_mac.sh

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ULTRA_FORCE-macos
          path: |
            dist/ULTRA_FORCE-macos-${{ env.RELEASE_VERSION }}.dmg
            dist/ULTRA_FORCE-macos-${{ env.RELEASE_VERSION }}-sha256.txt

      - name: Publish macOS Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ULTRA_FORCE-macos-${{ env.RELEASE_VERSION }}.dmg
            dist/ULTRA_FORCE-macos-${{ env.RELEASE_VERSION }}-sha256.txt

  build-windows:
    runs-on: windows-2022
    env:
      RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
      TROCR_MODEL_NAME: microsoft/trocr-base-handwritten
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      - name: Build Windows Release
        shell: cmd
        run: build_release_windows.bat

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ULTRA_FORCE-windows
          path: |
            dist/ULTRA_FORCE-windows-${{ env.RELEASE_VERSION }}.zip
            dist/ULTRA_FORCE-windows-${{ env.RELEASE_VERSION }}-setup.exe
            dist/ULTRA_FORCE-windows-${{ env.RELEASE_VERSION }}-sha256.txt

      - name: Publish Windows Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ULTRA_FORCE-windows-${{ env.RELEASE_VERSION }}.zip
            dist/ULTRA_FORCE-windows-${{ env.RELEASE_VERSION }}-setup.exe
            dist/ULTRA_FORCE-windows-${{ env.RELEASE_VERSION }}-sha256.txt

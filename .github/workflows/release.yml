name: Build And Release

on:
  workflow_dispatch:
    inputs:
      fast_release:
        description: "Use cached build state for faster manual builds"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    env:
      RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
      TROCR_MODEL_NAME: microsoft/trocr-base-handwritten
      MAC_BUILD_ARCH: arm64
      FAST_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.fast_release && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore macOS Build Cache
        uses: actions/cache@v4
        with:
          path: |
            .venv-web-build
            build
            ~/.cache/huggingface
            ~/Library/Caches/huggingface
            ~/.paddlex
          key: macos-build-${{ hashFiles('requirements-ai.txt', 'requirements-web.txt', 'build_web_app.sh', 'build_release_mac.sh', 'build_dmg.sh') }}-${{ env.TROCR_MODEL_NAME }}
          restore-keys: |
            macos-build-${{ hashFiles('requirements-ai.txt', 'requirements-web.txt') }}-
            macos-build-

      - name: Build macOS Release
        env:
          PYTHON_BIN: python
        run: bash build_release_mac.sh

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ULTRA_FORCE-macos
          path: |
            dist/ULTRA_FORCE-macos-${{ env.RELEASE_VERSION }}.dmg
            dist/ULTRA_FORCE-macos-${{ env.RELEASE_VERSION }}-sha256.txt

      - name: Publish macOS Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ULTRA_FORCE-macos-${{ env.RELEASE_VERSION }}.dmg
            dist/ULTRA_FORCE-macos-${{ env.RELEASE_VERSION }}-sha256.txt

  build-windows:
    runs-on: windows-2022
    env:
      RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
      TROCR_MODEL_NAME: microsoft/trocr-base-handwritten
      FAST_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.fast_release && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore Windows Build Cache
        uses: actions/cache@v4
        with:
          path: |
            .venv-web-build
            build
            ~\.cache\huggingface
            ~\.paddlex
            ~\AppData\Local\pip\Cache
          key: windows-build-${{ hashFiles('requirements-ai.txt', 'requirements-web.txt', 'build_web_app.bat', 'build_release_windows.bat', 'installer_windows.iss') }}-${{ env.TROCR_MODEL_NAME }}
          restore-keys: |
            windows-build-${{ hashFiles('requirements-ai.txt', 'requirements-web.txt') }}-
            windows-build-

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      - name: Install 7-Zip
        shell: powershell
        run: choco install 7zip -y

      - name: Build Windows Release
        shell: cmd
        run: build_release_windows.bat

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ULTRA_FORCE-windows
          path: |
            dist/ULTRA_FORCE-windows-${{ env.RELEASE_VERSION }}.zip
            dist/ULTRA_FORCE-windows-${{ env.RELEASE_VERSION }}-setup.exe
            dist/ULTRA_FORCE-windows-${{ env.RELEASE_VERSION }}-sha256.txt

      - name: Publish Windows Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ULTRA_FORCE-windows-${{ env.RELEASE_VERSION }}.zip
            dist/ULTRA_FORCE-windows-${{ env.RELEASE_VERSION }}-setup.exe
            dist/ULTRA_FORCE-windows-${{ env.RELEASE_VERSION }}-sha256.txt
